server:
  port: 5182
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wmserp
    username: wmserp_user
    password: wmserp_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    time-zone: Asia/Seoul
