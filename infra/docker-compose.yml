services:
  postgres:
    image: postgres:16-alpine
    container_name: wms_erp_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=wmserp
      - POSTGRES_USER=wmserp_user
      - POSTGRES_PASSWORD=wmserp_password
      - TZ=Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
